name: Build and Release Windows EXE

on:
  push:
    branches: [ main ]
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE
        run: pyinstaller --noconfirm --onefile --console --name PPTPNGTransparentConverter app.py

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: PPTPNGTransparentConverter
          path: dist/PPTPNGTransparentConverter.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PPTPNGTransparentConverter.exe
          generate_release_notes: true
          name: PowerPoint PNG 透過コンバーター ${{ github.ref_name }}